<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PADI 2026 | Digital Command Center</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .bg-lahan-blur {
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.75)), 
                        url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="bg-lahan-blur min-h-screen text-white p-4 md:p-10 antialiased">

    <div class="max-w-6xl mx-auto">
        
        <header class="flex justify-between items-start mb-16">
            <div class="space-y-1">
                <h1 class="text-3xl md:text-5xl font-extrabold tracking-tighter">PADI 2026</h1>
                <div class="flex items-center gap-2">
                    <span class="h-2 w-2 bg-emerald-500 rounded-full animate-pulse"></span>
                    <p class="text-[10px] uppercase tracking-[0.4em] font-bold text-emerald-400">
                        AgroEduLabs Digital Command Center
                    </p>
                </div>
            </div>
            
            <div class="border-2 border-white/90 px-5 py-2 backdrop-blur-md">
                <span class="text-xl font-black tracking-[0.3em]">OYOD</span>
            </div>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-20">
            
            <div class="glass-card rounded-2xl p-8 transition-transform hover:scale-[1.02] duration-300">
                <p class="text-[10px] uppercase tracking-widest text-white/40 mb-6 font-bold">Monitor Site: Kendal</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-6xl font-light tracking-tighter mono">24.5</span>
                    <span class="text-2xl font-light text-white/60">°C</span>
                </div>
                <div class="mt-6 flex items-center gap-2 text-[10px] text-emerald-400 font-bold uppercase tracking-widest border-t border-white/5 pt-4">
                    <span class="animate-pulse">●</span> Optimal Condition
                </div>
            </div>

            <div class="glass-card rounded-2xl p-8 transition-transform hover:scale-[1.02] duration-300">
                <p class="text-[10px] uppercase tracking-widest text-white/40 mb-6 font-bold">Monitor Site: Soropadan</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-6xl font-light tracking-tighter text-purple-200 mono">88</span>
                    <span class="text-2xl font-light text-white/60">%</span>
                </div>
                <div class="mt-6 flex items-center gap-2 text-[10px] text-purple-300 font-bold uppercase tracking-widest border-t border-white/5 pt-4">
                    Soil Moisture: High
                </div>
            </div>

            <div class="glass-card rounded-2xl p-8 border-purple-500/30 bg-purple-900/10 transition-transform hover:scale-[1.02] duration-300">
                <p class="text-[10px] uppercase tracking-widest text-purple-300/60 mb-6 font-bold">Production: Bawang Merah</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-6xl font-light tracking-tighter mono">1.2</span>
                    <span class="text-2xl font-light text-white/60">Tons</span>
                </div>
                <p class="mt-6 text-[12px] italic text-white/40 font-serif border-t border-white/5 pt-4">
                    "Berakar, Bergerak, Berarti"
                </p>
            </div>

        </main>

        <footer class="flex flex-col md:flex-row justify-between items-center opacity-30 text-[10px] tracking-[0.2em] uppercase space-y-4 md:space-y-0">
            <div>ASN Garden Project • Kendal • Soropadan</div>
            <div>Handbook Deployment v.2026.04</div>
        </footer>

    </div>

</body>
</html>
